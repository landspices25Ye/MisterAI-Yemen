<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>markdown.md</title>
    <link href='https://fonts.googleapis.com/css?family=Amiri' rel='stylesheet' type='text/css'>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
    window.MathJax = {
        tex: {
            packages: ['base', 'ams', 'noerrors', 'noundefined'],
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true,
            processEnvironments: true,
            digits: /^(\d+\.\d*|\.\d+)(?:[eE][-+]?\d+)?$/,
            tags: 'ams',
            tagSide: 'right',
            tagIndent: '0.8em',
            useLabelIds: true
        },
        options: {
            renderActions: {
                addMenu: [],
                checkDocument: []
            },
            enableMenu: true,
            menuOptions: {
                settings: {
                    semantics: true
                }
            }
        },
        loader: {
            load: ['input/tex', 'output/chtml', '[tex]/ams', '[tex]/noerrors', '[tex]/noundefined']
        },
        startup: {
            typeset: false,
            pageReady: () => {
                return MathJax.startup.defaultPageReady().then(() => {
                    MathJax.typesetPromise();
                });
            }
        },
        chtml: {
            displayAlign: 'center',
            displayIndent: '0em',
            mtextInheritFont: true,
            fontURL: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2',
            adaptiveCSS: true
        },
        arabic: {
            rtl: true,
            arabicNumerals: false,
            arabicMathTerms: true,
            preserveArabicText: true
        }
    };
    </script>
</head>
<body>
    <main>
        <img src="img-70.jpeg" alt="img-70.jpeg" /><img src="img-71.jpeg" alt="img-71.jpeg" /><p>الشكل (٢٤) انغراس الجنين في بطانة الرحم وتكون الطبقات الجرثومية الثلاث</p><p>ما الأعضاء والأجهزة التي تنشأ من الطبقات الجرثومية الثلاث؟
تعرف على ذلك من دراسة الجدول الآتي:</p><p>٩٠</p><p>الأحياء للصف الثالث الثانوي</p><p>http://E-learning-moe.edu.ye</p>
    </main>
    <footer>
        <p>تمت المعالجة بواسطة Arabic MathJax Processor</p>
    </footer>
</body>
</html>
